services:
  # ============================================================
  # AI Fitness Coach v1 — Production Deployment
  # ============================================================
  # External services (already running on the network):
  #   postgres: 192.168.50.137:5432
  #   wger:     192.168.50.98:3000
  #   tandoor:  192.168.50.226:8002
  #   ollama:   192.168.50.219:11434
  # ============================================================
  coach-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: coach-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/dashboard/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
